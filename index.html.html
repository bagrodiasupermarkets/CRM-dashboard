<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bagrodia Supermarkets — CRM Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#f5f6fa;--s1:#ffffff;--s2:#f8fafc;--s3:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --navy:#1a1a2e;--navy2:#2d3561;
  --text:#1e293b;--muted:#64748b;--hint:#94a3b8;
  --green:#166534;--green-bg:#f0fdf4;--green-bd:#86efac;
  --red:#991b1b;--red-bg:#fef2f2;--red-bd:#fca5a5;
  --amber:#92400e;--amber-bg:#fffbeb;--amber-bd:#fcd34d;
  --blue:#185FA5;--blue-bg:#eff6ff;--blue-bd:#93c5fd;
  --gold:#854F0B;--gold-bg:#faeeda;
  --r:8px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px}

/* ── PIN ── */
#pin-screen{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:16px}
.pin-co-name{font-size:11px;font-weight:600;color:var(--navy);letter-spacing:.06em;text-transform:uppercase;text-align:center}
.pin-title{font-size:20px;font-weight:600;color:var(--navy);text-align:center}
.pin-sub{font-size:12px;color:var(--hint);text-align:center}
.pin-dots{display:flex;gap:12px;justify-content:center;margin:4px 0 12px}
.pin-dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--border2);background:#fff;transition:all .15s}
.pin-dot.on{background:var(--navy);border-color:var(--navy)}
.pin-pad{display:grid;grid-template-columns:repeat(3,58px);gap:8px}
.pb{width:58px;height:58px;border-radius:50%;border:0.5px solid var(--border);background:var(--s2);font-size:17px;font-weight:500;color:var(--navy);cursor:pointer;transition:background .12s;display:flex;align-items:center;justify-content:center}
.pb:hover{background:var(--border)}
.pb:active{background:var(--border2)}
.pin-err{font-size:11px;color:var(--red);height:16px;text-align:center}
.pin-hint{font-size:11px;color:var(--hint);text-align:center}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}
.sb{width:256px;min-width:256px;background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;overflow-y:auto;background:var(--bg)}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── TOP BAR ── */
.topbar{background:var(--navy);height:44px;display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.t-logo{font-size:12px;font-weight:600;color:#fff;letter-spacing:.04em;flex:1}
.t-logo span{color:#f5c030}
.t-badge{font-size:10px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);padding:2px 8px;border-radius:10px}
.t-date{font-size:10px;color:rgba(255,255,255,.5)}

/* ── SIDEBAR ── */
.sb-search{padding:8px 10px;border-bottom:1px solid var(--border)}
.sb-search input{width:100%;padding:6px 9px 6px 28px;border:0.5px solid var(--border);border-radius:6px;font-size:11.5px;background:var(--s2);color:var(--text);outline:none;font-family:'Inter',sans-serif}
.sb-search input:focus{border-color:var(--navy)}
.sb-search input::placeholder{color:var(--hint)}
.sb-si{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:var(--hint);font-size:12px;pointer-events:none}
.sb-search{position:relative}
.sb-filters{display:flex;gap:4px;padding:6px 10px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.sft{font-size:9.5px;padding:2px 7px;border-radius:10px;border:0.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .12s}
.sft.on{background:var(--navy);border-color:var(--navy);color:#fff}
.sft.r.on{background:var(--red);border-color:var(--red);color:#fff}
.sft.g.on{background:#166534;border-color:#166534;color:#fff}
.clist{flex:1;overflow-y:auto}
.clist::-webkit-scrollbar{width:3px}
.clist::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.cl-section{font-size:9px;font-weight:600;color:var(--hint);padding:6px 10px 3px;text-transform:uppercase;letter-spacing:.08em;background:var(--s3);border-bottom:0.5px solid var(--border)}
.ci{padding:8px 10px;cursor:pointer;border-bottom:0.5px solid var(--s3);transition:background .1s;position:relative}
.ci:hover{background:var(--s2)}
.ci.on{background:var(--s2);border-left:2.5px solid var(--navy)}
.ci-top{display:flex;justify-content:space-between;align-items:flex-start;gap:4px;margin-bottom:2px}
.ci-name{font-size:11px;font-weight:500;flex:1;line-height:1.3;color:var(--text)}
.tb{font-size:8.5px;padding:1px 5px;border-radius:8px;white-space:nowrap;flex-shrink:0;font-weight:500}
.tP{background:#dcfce7;color:#166534}
.tG{background:var(--gold-bg);color:var(--gold)}
.tS{background:var(--blue-bg);color:var(--blue)}
.tB{background:var(--s3);color:var(--muted)}
.ci-bot{display:flex;justify-content:space-between;align-items:center}
.ci-rev{font-size:10.5px;font-weight:500;color:#059669;font-family:'JetBrains Mono',monospace}
.ci-sub{font-size:9.5px;color:var(--hint)}
.rdot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:4px;flex-shrink:0}
.hot{background:#10b981}
.warm{background:#f59e0b}
.cold{background:#ef4444}
.pg{padding:7px 10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.pg-info{font-size:9.5px;color:var(--hint);font-family:'JetBrains Mono',monospace}
.pg button{font-size:9.5px;background:var(--s2);border:0.5px solid var(--border);color:var(--text);padding:3px 9px;border-radius:4px;cursor:pointer;font-family:'Inter',sans-serif}
.pg button:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.pg button:disabled{opacity:.35;cursor:default}

/* ── OVERVIEW ── */
.ov{padding:18px 20px}
.ov-title{font-size:17px;font-weight:600;color:var(--navy);margin-bottom:2px}
.ov-sub{font-size:11px;color:var(--hint);margin-bottom:16px}

/* KPI row */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.kp{background:var(--s1);border:0.5px solid var(--border);border-radius:var(--r);padding:11px 13px;border-top:2.5px solid var(--border)}
.kp:nth-child(1){border-top-color:var(--navy)}
.kp:nth-child(2){border-top-color:#10b981}
.kp:nth-child(3){border-top-color:#ef4444}
.kp:nth-child(4){border-top-color:#f59e0b}
.kp-l{font-size:9.5px;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.kp-v{font-size:19px;font-weight:600;color:var(--navy)}
.kp-s{font-size:10px;color:var(--muted);margin-top:2px}

/* Cards */
.card{background:var(--s1);border:0.5px solid var(--border);border-radius:var(--r);padding:13px 14px;margin-bottom:10px}
.card-t{font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}

/* priority list */
.pr-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--s3);cursor:pointer;transition:background .1s}
.pr-row:hover{background:var(--s2);margin:0 -4px;padding-left:4px;padding-right:4px;border-radius:4px}
.pr-row:last-child{border-bottom:none}
.pr-num{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--hint);width:18px;flex-shrink:0;padding-top:1px}
.pr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:3px}
.pr-info{flex:1;min-width:0}
.pr-name{font-size:11.5px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.pr-why{font-size:10px;color:var(--hint);line-height:1.4}
.pr-right{text-align:right;flex-shrink:0}
.pr-val{font-size:11px;font-weight:500;color:var(--text);font-family:'JetBrains Mono',monospace}
.pr-days{font-size:9.5px}

/* month bars overview */
.mbars{display:flex;gap:8px;align-items:flex-end;height:70px;margin-top:4px}
.mbw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.mbv{font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-align:center}
.mbr{width:100%;border-radius:3px 3px 0 0;min-height:3px}
.mbl{font-size:9px;color:var(--hint)}

/* brand bars overview */
.br-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.br-n{font-size:11px;width:76px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.br-t{flex:1;background:var(--s3);border-radius:3px;height:5px;overflow:hidden}
.br-f{height:100%;border-radius:3px;background:linear-gradient(90deg,#f59e0b,#f5c030)}
.br-v{font-size:9.5px;font-family:'JetBrains Mono',monospace;color:var(--hint);width:50px;text-align:right}

/* small ir row */
.ir{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:0.5px solid var(--s3)}
.ir:last-child{border-bottom:none}
.il{font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:6px;cursor:pointer;color:var(--text)}
.il:hover{color:var(--navy)}
.iv{font-size:10.5px;font-family:'JetBrains Mono',monospace;color:#059669;white-space:nowrap}

/* ── CLIENT DETAIL ── */
.dp{padding:18px 20px;display:none}
.dp.on{display:block}
.back-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--hint);cursor:pointer;font-size:11px;font-family:'Inter',sans-serif;padding:0;margin-bottom:12px;transition:color .12s}
.back-btn:hover{color:var(--navy)}

/* alert */
.abn{padding:8px 11px;border-radius:6px;font-size:11px;margin-bottom:12px;display:flex;align-items:center;gap:7px;font-weight:500;border-left:3px solid}
.a-red{background:var(--red-bg);border-color:#ef4444;color:var(--red)}
.a-amb{background:var(--amber-bg);border-color:#f59e0b;color:var(--amber)}
.a-grn{background:var(--green-bg);border-color:#10b981;color:var(--green)}

/* client header */
.ch{background:var(--s1);border:0.5px solid var(--border);border-radius:var(--r2);padding:13px 15px;margin-bottom:10px}
.ch-top{display:flex;align-items:flex-start;gap:11px;margin-bottom:10px}
.ch-av{width:42px;height:42px;border-radius:8px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#f5c030;flex-shrink:0}
.ch-info{flex:1}
.ch-name{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:5px;line-height:1.2}
.ch-tags{display:flex;gap:5px;flex-wrap:wrap}
.ch-tag{font-size:9.5px;padding:2px 6px;border-radius:7px;border:0.5px solid var(--border);color:var(--muted)}
.cscore{text-align:center;padding:8px 14px;background:var(--s2);border-radius:8px;border:0.5px solid var(--border);flex-shrink:0}
.csn{font-size:24px;font-weight:700;line-height:1}
.csl{font-size:9px;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}

/* RFM */
.rfm-row{display:flex;gap:6px;margin-bottom:10px}
.rfm-c{flex:1;background:var(--s2);border-radius:6px;border:0.5px solid var(--border);padding:7px;text-align:center}
.rfm-s{font-size:20px;font-weight:600;line-height:1}
.rfm-l{font-size:9px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.rfm-sub{font-size:9.5px;color:var(--muted);margin-top:2px}
.rfm-combo{flex:1.5;text-align:left;padding:8px 10px}
.rfm-badge{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:3px;font-family:'JetBrains Mono',monospace}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:12px;background:var(--s1);border-radius:var(--r) var(--r) 0 0;border:0.5px solid var(--border);overflow:hidden}
.tab{padding:8px 12px;font-size:11px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;flex:1;text-align:center;font-weight:500}
.tab:hover{color:var(--navy);background:var(--s2)}
.tab.on{color:var(--navy);border-bottom-color:var(--navy);background:var(--s1)}

/* monthly tab */
.mo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:10px}
.mo-cell{background:var(--s2);border:0.5px solid var(--border);border-radius:6px;padding:9px;text-align:center}
.mo-cell.best{background:#dcfce7;border-color:var(--green-bd)}
.mo-cell.worst{background:var(--red-bg);border-color:var(--red-bd)}
.mo-cell.warn{background:var(--amber-bg);border-color:var(--amber-bd)}
.mo-m{font-size:9px;color:var(--hint);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.mo-v{font-size:14px;font-weight:600;color:var(--navy);font-family:'JetBrains Mono',monospace;margin-bottom:2px}
.mo-o{font-size:9.5px;color:var(--muted)}
.mo-ch{font-size:10px;font-weight:500;margin-top:2px}
.up{color:#166534}.dn{color:#991b1b}.na{color:var(--hint)}

/* brand tab - table */
.tbl-wrap{background:var(--s1);border:0.5px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.btbl{width:100%;border-collapse:collapse}
.btbl th{font-size:9.5px;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;padding:6px 10px;text-align:right;border-bottom:1px solid var(--border);background:var(--s2);white-space:nowrap;font-weight:500}
.btbl th:first-child{text-align:left;width:110px}
.btbl th:last-child{text-align:center}
.btbl td{padding:5px 10px;border-bottom:0.5px solid var(--s3);text-align:right;white-space:nowrap;font-size:11px;font-family:'JetBrains Mono',monospace}
.btbl td:first-child{text-align:left;font-family:'Inter',sans-serif;font-weight:500;font-size:11.5px;color:var(--text)}
.btbl td.chg{font-size:10.5px;font-weight:600}
.btbl tr:last-child td{border-bottom:none}
.btbl tr:hover td{background:var(--s2)}
.vs{background:var(--red-bg);color:var(--red)}
.vd{background:var(--amber-bg);color:var(--amber)}
.vg{background:var(--green-bg);color:var(--green)}
.vn{background:#f8fafc;color:var(--hint);font-style:italic}
.vz{color:#d1d5db}
.st{display:inline-block;font-size:8.5px;padding:2px 6px;border-radius:8px;font-family:'Inter',sans-serif;font-weight:500}
.st-s{background:var(--red-bg);color:var(--red)}
.st-d{background:var(--amber-bg);color:var(--amber)}
.st-g{background:var(--green-bg);color:var(--green)}
.st-n{background:var(--blue-bg);color:var(--blue)}
.st-st{background:var(--s3);color:var(--muted)}

/* sku tab */
.bg-head{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--s3);border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none}
.bg-head:hover{background:#e8edf5}
.bg-arr{font-size:9px;color:var(--hint);transition:transform .15s;display:inline-block}
.bg-arr.o{transform:rotate(90deg)}
.bg-brand{font-size:11.5px;font-weight:600;color:var(--navy)}
.bg-cnt{font-size:10px;color:var(--hint)}
.bg-tot{font-size:10.5px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-left:auto}
.stbl{width:100%;border-collapse:collapse}
.stbl th{font-size:9px;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;padding:5px 10px;text-align:right;border-bottom:0.5px solid var(--border);background:var(--s1);white-space:nowrap;font-weight:500}
.stbl th:first-child{text-align:left}
.stbl td{padding:5px 10px;border-bottom:0.5px solid var(--s3);text-align:right;white-space:nowrap;font-size:10.5px;font-family:'JetBrains Mono',monospace;vertical-align:middle}
.stbl td:first-child{text-align:left;font-family:'Inter',sans-serif;font-size:11px;max-width:190px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stbl tr:last-child td{border-bottom:none}
.stbl tr:hover td{background:var(--s2)}
.sdot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0}

/* new & missing */
.nm-section{margin-bottom:12px}
.nm-head{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:6px;margin-bottom:8px}
.nm-head.miss{background:var(--red-bg);border:0.5px solid var(--red-bd)}
.nm-head.new{background:var(--green-bg);border:0.5px solid var(--green-bd)}
.nm-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.nm-lbl.miss{color:var(--red)}
.nm-lbl.new{color:var(--green)}
.nm-cnt{font-size:9.5px;font-weight:500}
.nm-sub{font-size:10.5px;color:var(--hint);margin-left:auto}
.urg{font-size:8.5px;font-weight:600;padding:1px 5px;border-radius:6px}
.urg-h{background:var(--red-bg);color:var(--red)}
.urg-m{background:var(--amber-bg);color:var(--amber)}
.urg-l{background:var(--s3);color:var(--muted)}

/* pitch tab */
.pc{background:var(--s1);border:0.5px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:8px;border-top:2px solid #10b981}
.pc-brand{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:2px}
.pc-meta{font-size:10px;color:var(--hint);margin-bottom:8px}
.pc-items{display:flex;flex-direction:column;gap:3px}
.pc-item{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;background:var(--s2);border-radius:4px;border:0.5px solid var(--border)}
.pc-iname{font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:6px;color:var(--text)}
.pc-ival{font-size:10px;color:#059669;font-family:'JetBrains Mono',monospace;font-weight:500;flex-shrink:0}

/* call log */
.cl-form{background:var(--s1);border:0.5px solid var(--border);border-radius:var(--r);padding:12px;margin-bottom:10px}
.cl-fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.cl-lbl{font-size:10px;color:var(--hint);margin-bottom:3px}
.cl-sel,.cl-inp,.cl-ta{width:100%;font-size:11.5px;padding:6px 8px;border:0.5px solid var(--border);border-radius:5px;background:#fff;color:var(--text);font-family:'Inter',sans-serif;outline:none}
.cl-sel:focus,.cl-inp:focus,.cl-ta:focus{border-color:var(--navy)}
.cl-ta{resize:none}
.cl-save{background:var(--navy);color:#fff;border:none;padding:7px 16px;border-radius:5px;font-size:11.5px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500}
.cl-save:hover{background:var(--navy2)}
.log-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--s3)}
.log-row:last-child{border-bottom:none}
.log-info{flex:1;min-width:0}
.log-who{font-size:11px;font-weight:500;color:var(--text);margin-bottom:2px}
.log-note{font-size:10.5px;color:var(--muted);line-height:1.4}
.log-oc{font-size:9px;font-weight:600;padding:2px 6px;border-radius:8px;flex-shrink:0;white-space:nowrap}
.oc-pos{background:var(--green-bg);color:var(--green)}
.oc-neu{background:var(--s3);color:var(--muted)}
.oc-na{background:var(--amber-bg);color:var(--amber)}
.oc-ord{background:var(--blue-bg);color:var(--blue)}

/* partial banner */
.pbn{display:flex;align-items:center;gap:8px;padding:7px 11px;background:var(--amber-bg);border:0.5px solid var(--amber-bd);border-radius:6px;margin-bottom:10px;font-size:11px;color:var(--amber)}
.pbn-btn{margin-left:auto;font-size:10px;background:var(--navy);color:#fff;border:none;padding:3px 9px;border-radius:4px;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif}

/* legend */
.legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}

<script>

<script>

// Data is fetched server-side via Google Apps Script

// ── LOADING SCREEN ──
function showLoader(msg){
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('app').style.display='none';
  let ld=document.getElementById('loader');
  if(!ld){
    ld=document.createElement('div');
    ld.id='loader';
    ld.style.cssText='position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999';
    ld.innerHTML=`
      <div style="font-size:12px;font-weight:600;color:#1a1a2e;letter-spacing:.06em;text-transform:uppercase">Bagrodia Supermarkets Pvt Ltd</div>
      <div style="font-size:18px;font-weight:600;color:#1a1a2e">Loading Dashboard</div>
      <div id="loader-msg" style="font-size:12px;color:#94a3b8">Connecting to Google Sheet...</div>
      <div style="width:240px;height:4px;background:#f1f5f9;border-radius:2px;overflow:hidden">
        <div id="loader-bar" style="height:100%;width:0%;background:#1a1a2e;border-radius:2px;transition:width .4s ease"></div>
      </div>
      <div id="loader-err" style="font-size:11px;color:#991b1b;max-width:320px;text-align:center;display:none"></div>
    `;
    document.body.appendChild(ld);
  }
  document.getElementById('loader-msg').textContent=msg;
  document.getElementById('loader').style.display='flex';
}

function setProgress(pct,msg){
  const bar=document.getElementById('loader-bar');
  const lmsg=document.getElementById('loader-msg');
  if(bar)bar.style.width=pct+'%';
  if(lmsg&&msg)lmsg.textContent=msg;
}

function hideLoader(){
  const ld=document.getElementById('loader');
  if(ld)ld.style.display='none';
}

function showError(msg){
  const err=document.getElementById('loader-err');
  const lmsg=document.getElementById('loader-msg');
  if(err){err.textContent=msg;err.style.display='block';}
  if(lmsg)lmsg.textContent='Failed to load data';
  setProgress(0);
}

// ── CSV PARSER ──
function parseCSV(text){
  const lines=text.trim().split('\n');
  if(lines.length<2)return[];
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').trim());
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const cols=splitCSVLine(lines[i]);
    if(cols.length<4)continue;
    const row={};
    headers.forEach((h,j)=>{row[h]=(cols[j]||'').trim().replace(/^"|"$/g,'').trim();});
    rows.push(row);
  }
  return{headers,rows};
}

function splitCSVLine(line){
  const result=[];let cur='';let inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){result.push(cur);cur='';}
    else{cur+=c;}
  }
  result.push(cur);
  return result;
}

// ── DATE HELPERS ──
function parseDate(s){
  if(!s)return null;
  const d=new Date(s);
  if(!isNaN(d))return d;
  // try DD/MM/YYYY
  const parts=s.split('/');
  if(parts.length===3){
    const d2=new Date(`${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`);
    if(!isNaN(d2))return d2;
  }
  return null;
}

function getMonthKey(d){
  if(!d)return null;
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[d.getMonth()]+' '+d.getFullYear();
}

// ── MAIN DATA PROCESSOR ──
async function loadAndProcess(){
  showLoader('Fetching data from Google Sheet...');
  setProgress(10);

  let csvText;
  // Try multiple methods to fetch CSV
  const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWxiti_3lTjWv-fx_apdx-oPk6Bs8Rzinzlad3jlFDrXiTNgEOlwd6EYmUxDBRpt77B8K125qy-ZY_/pub?output=csv';
  const PROXY = 'https://corsproxy.io/?';
  try{
    // First try direct fetch
    let resp;
    try{
      resp = await fetch(CSV_URL);
      if(!resp.ok) throw new Error('direct failed');
      csvText = await resp.text();
    } catch(e1){
      // Fall back to CORS proxy
      setProgress(15,'Using proxy connection...');
      resp = await fetch(PROXY + encodeURIComponent(CSV_URL));
      if(!resp.ok) throw new Error('proxy failed: HTTP '+resp.status);
      csvText = await resp.text();
    }
  }catch(e){
    showError('Could not load Google Sheet. Check internet connection and make sure the sheet is published as CSV. Error: '+e.message);
    return null;
  }

  setProgress(25,'Parsing data...');
  const parsed=parseCSV(csvText);
  if(!parsed||!parsed.rows||parsed.rows.length<10){
    showError('Sheet data appears empty or could not be parsed. Make sure the sheet has data and is published correctly.');
    return null;
  }

  // Detect column names flexibly
  const hdrs=parsed.headers;
  const COL={
    date: hdrs.find(h=>/date/i.test(h)&&!/invoice/i.test(h))||hdrs[0],
    invoice: hdrs.find(h=>/invoice/i.test(h))||hdrs[1],
    customer: hdrs.find(h=>/customer/i.test(h))||hdrs[2],
    brand: hdrs.find(h=>/brand/i.test(h))||hdrs[3],
    item: hdrs.find(h=>/item/i.test(h))||hdrs[4],
    qty: hdrs.find(h=>/qty|quantity/i.test(h))||hdrs[5],
    value: hdrs.find(h=>/total.*bcy|value|amount/i.test(h))||hdrs[6],
  };

  setProgress(35,'Processing transactions...');

  // Parse all rows
  const transactions=[];
  const TODAY=new Date();
  const dayOfMonth=TODAY.getDate();

  for(const row of parsed.rows){
    const d=parseDate(row[COL.date]);
    if(!d)continue;
    const val=parseFloat(row[COL.value])||0;
    if(!row[COL.customer]||val===0)continue;
    transactions.push({
      date:d,
      monthKey:getMonthKey(d),
      invoice:row[COL.invoice]||'',
      customer:row[COL.customer].trim(),
      brand:row[COL.brand]||'Other',
      item:row[COL.item]||'Unknown',
      qty:parseFloat(row[COL.qty])||0,
      value:val
    });
  }

  if(transactions.length===0){
    showError('No valid transactions found. Check column names in your sheet match: Date, Invoice Number, Customer Name, Brand_1, Item Name, Total Quantity, Total Total (BCY)');
    return null;
  }

  setProgress(45,'Identifying months...');

  // Get all unique months, sort, take last 5
  const allMonthKeys=[...new Set(transactions.map(t=>t.monthKey))].filter(Boolean);
  // Sort by date
  allMonthKeys.sort((a,b)=>{
    const pa=a.split(' ');const pb=b.split(' ');
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const ya=parseInt(pa[1]),yb=parseInt(pb[1]);
    const ma=months.indexOf(pa[0]),mb=months.indexOf(pb[0]);
    return ya!==yb?ya-yb:ma-mb;
  });

  // Last 5 months max
  const last5=allMonthKeys.slice(-5);
  const currentMonthKey=last5[last5.length-1];
  const completedMonths=last5.slice(0,-1); // all except current
  const currentMonthName=currentMonthKey.split(' ')[0];

  // Is current month partial?
  const showMissingTab=dayOfMonth>=10;
  const includeCurrentMonth=dayOfMonth>=20;

  setProgress(55,'Computing client profiles...');

  // Group transactions
  const byClient={};
  for(const t of transactions){
    if(!byClient[t.customer])byClient[t.customer]={invoices:new Set(),dates:[],monthRev:{},monthOrd:{},brandMonth:{},skuMonth:{}};
    const c=byClient[t.customer];
    c.invoices.add(t.invoice);
    c.dates.push(t.date);
    if(!c.monthRev[t.monthKey])c.monthRev[t.monthKey]=0;
    c.monthRev[t.monthKey]+=t.value;
    if(!c.monthOrd[t.monthKey])c.monthOrd[t.monthKey]=new Set();
    c.monthOrd[t.monthKey].add(t.invoice);
    // brand x month
    const bk=t.brand+'|||'+t.monthKey;
    if(!c.brandMonth[bk])c.brandMonth[bk]=0;
    c.brandMonth[bk]+=t.value;
    // sku x month
    const sk=t.item+'|||'+t.brand+'|||'+t.monthKey;
    if(!c.skuMonth[sk])c.skuMonth[sk]=0;
    c.skuMonth[sk]+=t.value;
  }

  // Global brand totals (completed months only)
  const globalBrandTotals={};
  const globalBrandItems={};
  for(const t of transactions){
    if(!completedMonths.includes(t.monthKey))continue;
    if(!globalBrandTotals[t.brand])globalBrandTotals[t.brand]=0;
    globalBrandTotals[t.brand]+=t.value;
    if(!globalBrandItems[t.brand])globalBrandItems[t.brand]={};
    if(!globalBrandItems[t.brand][t.item])globalBrandItems[t.brand][t.item]=0;
    globalBrandItems[t.brand][t.item]+=t.value;
  }
  const topBrandsSorted=Object.entries(globalBrandTotals).sort((a,b)=>b[1]-a[1]);

  setProgress(70,'Analysing trends...');

  const statusOrder={STOPPED:0,DECLINING:1,STABLE:2,GROWING:3,NEW:4};
  const dotColor={STOPPED:'#ef4444',DECLINING:'#f59e0b',STABLE:'#94a3b8',GROWING:'#10b981',NEW:'#3b82f6'};

  function classifyTrend(vals){
    // vals = array for completed months only
    const n=vals.length;
    if(n===0)return'NONE';
    const nz=vals.filter(v=>v>0).length;
    if(nz===0)return'NONE';
    const latest=vals[n-1];
    const hadHistory=vals.slice(0,n-1).some(v=>v>0);
    if(hadHistory&&latest===0)return'STOPPED';
    if(vals.slice(0,n-2).every(v=>v===0)&&latest>0)return'NEW';
    if(n>=3){
      const recentAvg=(vals[n-1]+vals[n-2])/2;
      const priorAvg=(vals[n-2]+vals[n-3])/2;
      if(priorAvg>0){
        const chg=(recentAvg-priorAvg)/priorAvg;
        const absDrop=priorAvg-recentAvg;
        const months=vals.filter(v=>v>0).length;
        if(chg<=-0.30&&absDrop>=2000&&months>=3)return'DECLINING';
        if(chg>=0.40&&months>=2)return'GROWING';
      }
    }
    return'STABLE';
  }

  function rfmScore(daysSince,invoices,activeMonths,avgMonthly){
    const r=daysSince<=10?5:daysSince<=20?4:daysSince<=35?3:daysSince<=60?2:1;
    const opm=invoices/Math.max(activeMonths,1);
    const f=opm>=6?5:opm>=3?4:opm>=2?3:opm>=1?2:1;
    const m=avgMonthly>=500000?5:avgMonthly>=200000?4:avgMonthly>=100000?3:avgMonthly>=25000?2:1;
    return{R:r,F:f,M:m,score:`R${r} F${f} M${m}`};
  }

  // Build clients
  const clients=[];
  const allCustomers=Object.keys(byClient);

  for(const custName of allCustomers){
    const c=byClient[custName];
    const sortedDates=c.dates.sort((a,b)=>a-b);
    const lastDate=sortedDates[sortedDates.length-1];
    const firstDate=sortedDates[0];
    const daysSince=Math.floor((TODAY-lastDate)/(1000*60*60*24));

    // Order gap
    const uniqueDates=[...new Set(sortedDates.map(d=>d.toDateString()))].map(s=>new Date(s)).sort((a,b)=>a-b);
    let avgGap=null,gapRatio=null,overdue=false;
    if(uniqueDates.length>=2){
      const gaps=[];
      for(let i=1;i<uniqueDates.length;i++)gaps.push((uniqueDates[i]-uniqueDates[i-1])/(1000*60*60*24));
      avgGap=Math.round(gaps.reduce((a,b)=>a+b,0)/gaps.length*10)/10;
      gapRatio=avgGap>0?Math.round(daysSince/avgGap*100)/100:null;
      overdue=gapRatio>=1.5&&daysSince>7;
    }

    // Monthly revenue
    const monthlyRev={};
    const monthlyOrders={};
    for(const mk of last5){
      const shortM=mk.split(' ')[0];
      monthlyRev[shortM]=Math.round((c.monthRev[mk]||0)*100)/100;
      monthlyOrders[shortM]=c.monthOrd[mk]?c.monthOrd[mk].size:0;
    }

    const compVals=completedMonths.map(mk=>c.monthRev[mk]||0);
    const totalRev=compVals.reduce((a,b)=>a+b,0);
    const aprRev=c.monthRev[currentMonthKey]||0;
    const invoiceCount=c.invoices.size;
    const activeMonths=completedMonths.filter(mk=>(c.monthRev[mk]||0)>0).length;
    const avgMonthly=totalRev/Math.max(activeMonths,1);
    const avgOrderVal=totalRev/Math.max(invoiceCount,1);

    // RFM
    const rfm=rfmScore(daysSince,invoiceCount,activeMonths,avgMonthly);

    // Brand analysis
    const allBrands=[...new Set(Object.keys(c.brandMonth).map(k=>k.split('|||')[0]))];
    const brands=[];
    for(const brand of allBrands){
      const vals=completedMonths.map(mk=>c.brandMonth[brand+'|||'+mk]||0);
      const aprVal=c.brandMonth[brand+'|||'+currentMonthKey]||0;
      const status=classifyTrend(vals);
      if(status==='NONE')continue;
      brands.push({brand,vals:vals.map(v=>Math.round(v)),aprVal:Math.round(aprVal),status,total:Math.round(vals.reduce((a,b)=>a+b,0))});
    }
    brands.sort((a,b)=>(statusOrder[a.status]||4)-(statusOrder[b.status]||4)||(b.total-a.total));

    // SKU analysis
    const allSKUKeys=[...new Set(Object.keys(c.skuMonth).map(k=>{const p=k.split('|||');return p[0]+'|||'+p[1];}))];
    const skus=[];
    for(const sk of allSKUKeys){
      const [item,brand]=sk.split('|||');
      const vals=completedMonths.map(mk=>c.skuMonth[item+'|||'+brand+'|||'+mk]||0);
      const aprVal=c.skuMonth[item+'|||'+brand+'|||'+currentMonthKey]||0;
      const status=classifyTrend(vals);
      if(status==='NONE')continue;
      const latestVal=vals[vals.length-1]||0;
      const nzVals=vals.filter(v=>v>0);
      const avgVal=nzVals.length?Math.round(nzVals.reduce((a,b)=>a+b,0)/nzVals.length):0;
      skus.push({item:item.length>45?item.substring(0,45):item,brand,vals:vals.map(v=>Math.round(v)),aprVal:Math.round(aprVal),status,latestVal,avgVal});
    }
    skus.sort((a,b)=>(statusOrder[a.status]||4)-(statusOrder[b.status]||4)||(a.latestVal-b.latestVal));

    // Missing SKUs (current month)
    const missingSKUs=[];
    const newThisMonth=[];
    for(const sk of allSKUKeys){
      const[item,brand]=sk.split('|||');
      const compValsS=completedMonths.map(mk=>c.skuMonth[item+'|||'+brand+'|||'+mk]||0);
      const aprValS=c.skuMonth[item+'|||'+brand+'|||'+currentMonthKey]||0;
      const boughtInLast3=compValsS.slice(-3).filter(v=>v>0).length;
      const nzC=compValsS.filter(v=>v>0);
      const avgVal=nzC.length?Math.round(nzC.reduce((a,b)=>a+b,0)/nzC.length):0;
      if(boughtInLast3>=1&&aprValS===0){
        const urgency=avgVal>=10000?'HIGH':avgVal>=2000?'MEDIUM':'LOW';
        missingSKUs.push({item:item.length>45?item.substring(0,45):item,brand,lastMonths:compValsS.slice(-3).map(v=>Math.round(v)),avgVal,urgency});
      }
      if(boughtInLast3===0&&aprValS>0){
        newThisMonth.push({item:item.length>45?item.substring(0,45):item,brand,thisMonthVal:Math.round(aprValS)});
      }
    }
    missingSKUs.sort((a,b)=>b.avgVal-a.avgVal);
    newThisMonth.sort((a,b)=>b.thisMonthVal-a.thisMonthVal);

    // Pitch brands
    const clientBrands=new Set(brands.map(b=>b.brand));
    const pitchBrands=topBrandsSorted
      .filter(([b])=>!clientBrands.has(b))
      .slice(0,4)
      .map(([brand,rev],idx)=>{
        const topItems=Object.entries(globalBrandItems[brand]||{}).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([item,val])=>[item.length>35?item.substring(0,35):item,Math.round(val)]);
        return{brand,globalRank:topBrandsSorted.findIndex(([b])=>b===brand)+1,globalRevenue:Math.round(rev),topItems};
      });

    // Tier (will be assigned after sorting all clients)
    // Priority
    let priority=8;
    const marRev=monthlyRev[completedMonths[completedMonths.length-1]?.split(' ')[0]]||0;
    const janRev=monthlyRev[completedMonths[0]?.split(' ')[0]]||0;
    const dropPct=janRev>0?((marRev-janRev)/janRev*100):0;
    if(overdue&&['Platinum','Gold'].includes('Bronze'))priority=1; // will update after tier
    else if(overdue)priority=2;
    else if(dropPct<=-30)priority=4;

    // Call score (tier TBD)
    clients.push({
      name:custName,
      total:Math.round(totalRev),
      invoices:invoiceCount,
      tier:'Bronze',// placeholder
      daysSince,avgGap,gapRatio,overdue,
      lastPurchase:lastDate.toISOString().split('T')[0],
      firstPurchase:firstDate.toISOString().split('T')[0],
      avgOrderVal:Math.round(avgOrderVal),
      monthlyRev,monthlyOrders,rfm,
      callScore:50,// placeholder
      priority,
      brands:brands.slice(0,25),
      skus:skus.slice(0,20),
      missingSKUs:missingSKUs.slice(0,12),
      newThisMonth:newThisMonth.slice(0,10),
      pitchBrands
    });
  }

  setProgress(85,'Calculating tiers and scores...');

  // Assign tiers
  clients.sort((a,b)=>b.total-a.total);
  const n=clients.length;
  clients.forEach((c,i)=>{
    const pct=i/n;
    c.tier=pct<0.10?'Platinum':pct<0.30?'Gold':pct<0.60?'Silver':'Bronze';

    // Recalculate priority with tier
    if(c.overdue&&['Platinum','Gold'].includes(c.tier))c.priority=1;
    else if(c.overdue)c.priority=2;
    else{
      const marKey=completedMonths[completedMonths.length-1]?.split(' ')[0];
      const janKey=completedMonths[0]?.split(' ')[0];
      const mar=c.monthlyRev[marKey]||0;
      const jan=c.monthlyRev[janKey]||0;
      const drop=jan>0?((mar-jan)/jan*100):0;
      if(drop<=-30&&['Platinum','Gold'].includes(c.tier))c.priority=3;
      else if(drop<=-30)c.priority=4;
      else c.priority=8;
    }

    // Call score
    let sc=50;
    if(c.tier==='Platinum')sc+=25;
    else if(c.tier==='Gold')sc+=15;
    else if(c.tier==='Silver')sc+=5;
    if(c.daysSince<=7)sc+=15;
    else if(c.daysSince<=21)sc+=5;
    else sc-=10;
    if(c.invoices>=10)sc+=8;
    if(c.brands.some(b=>b.status==='STOPPED'||b.status==='DECLINING'))sc-=8;
    c.callScore=Math.max(10,Math.min(99,sc));
  });

  // Sort by priority then total
  clients.sort((a,b)=>a.priority-b.priority||b.total-a.total);

  setProgress(95,'Building dashboard...');

  // Monthly summary
  const monthly=last5.map(mk=>({
    month:mk.split(' ')[0],
    revenue:Math.round(transactions.filter(t=>t.monthKey===mk).reduce((a,t)=>a+t.value,0)),
    orders:new Set(transactions.filter(t=>t.monthKey===mk).map(t=>t.invoice)).size,
    clients:new Set(transactions.filter(t=>t.monthKey===mk).map(t=>t.customer)).size
  }));

  // Overview totals (completed months only)
  const totalRevenue=transactions.filter(t=>completedMonths.includes(t.monthKey)).reduce((a,t)=>a+t.value,0);
  const totalInvoices=new Set(transactions.filter(t=>completedMonths.includes(t.monthKey)).map(t=>t.invoice)).size;
  const totalBrands=new Set(transactions.filter(t=>completedMonths.includes(t.monthKey)).map(t=>t.brand)).size;
  const totalSKUs=new Set(transactions.filter(t=>completedMonths.includes(t.monthKey)).map(t=>t.item)).size;

  const D={
    meta:{
      generatedDate:TODAY.toISOString().split('T')[0],
      dayOfMonth,
      showMissingTab,
      includeCurrentMonth,
      months:completedMonths.map(mk=>mk.split(' ')[0]),
      currentMonth:currentMonthName,
      totalRevenue:Math.round(totalRevenue),
      totalClients:clients.length,
      totalInvoices,
      totalBrands,
      totalSKUs,
      lastRefreshed:new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}),
      rowsProcessed:transactions.length
    },
    monthly,
    topBrands:topBrandsSorted.slice(0,12).map(([b,v])=>[b,Math.round(v)]),
    clients
  };

  setProgress(100,'Ready');
  setTimeout(hideLoader,400);
  return D;
}

</script>
<script>

// ── UTILS ──
const fmt=n=>{
  if(!n||isNaN(n))return'—';
  if(n>=10000000)return'₹'+(n/10000000).toFixed(1)+'Cr';
  if(n>=100000)return'₹'+(n/100000).toFixed(1)+'L';
  if(n>=1000)return'₹'+(n/1000).toFixed(0)+'K';
  return'₹'+Math.round(n);
};
const ini=s=>s.split(' ').filter(w=>w.length>2).slice(0,2).map(w=>w[0]).join('').toUpperCase()||s.substring(0,2).toUpperCase();
const risk=c=>c.daysSince<=10?'hot':c.daysSince<=25?'warm':'cold';
const esc=s=>(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;');
const hasChurn=c=>(c.brands||[]).some(b=>b.status==='STOPPED'||b.status==='DECLINING');
const tbMap={Platinum:'tP',Gold:'tG',Silver:'tS',Bronze:'tB'};
const statusOrder={STOPPED:0,DECLINING:1,STABLE:2,GROWING:3,NEW:4};
const stCls={STOPPED:'st-s',DECLINING:'st-d',STABLE:'st-st',GROWING:'st-g',NEW:'st-n'};
const stLabel={STOPPED:'Stopped',DECLINING:'Declining',STABLE:'Stable',GROWING:'Growing',NEW:'New'};
const dotColor={STOPPED:'#ef4444',DECLINING:'#f59e0b',STABLE:'#94a3b8',GROWING:'#10b981',NEW:'#3b82f6'};

// ── PIN ──
let pin='';
const CORRECT='1234';
function pp(k){
  const err=document.getElementById('perr');err.textContent='';
  if(k==='c'){pin='';updDots();return}
  if(k==='d'){pin=pin.slice(0,-1);updDots();return}
  if(pin.length>=4)return;
  pin+=k;updDots();
  if(pin.length===4){
    if(pin===CORRECT){
      document.getElementById('pin-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      document.getElementById('t-date').textContent=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
      renderOV();renderList();
    } else {
      err.textContent='Incorrect PIN. Try again.';
      setTimeout(()=>{pin='';updDots();},700);
    }
  }
}
function updDots(){for(let i=0;i<4;i++)document.getElementById('pd'+i).className='pin-dot'+(i<pin.length?' on':'');}

// ── SIDEBAR ──
let filtered=[...D.clients],activeFilt='all',page=0,selName=null;
const PG=40;

function renderList(){
  const start=page*PG,slice=filtered.slice(start,start+PG);
  const el=document.getElementById('cList');
  // Group by urgency section
  let html='';
  let lastSec='';
  slice.forEach(c=>{
    const sec=c.priority<=2?'Urgent — Call Today':c.priority<=4?'Needs Attention':'All Clients';
    if(sec!==lastSec){html+=`<div class="cl-section">${sec}</div>`;lastSec=sec;}
    const r=risk(c);
    const isOn=selName===c.name?' on':'';
    html+=`<div class="ci${isOn}" onclick="openClient('${esc(c.name)}')">
      <div class="ci-top">
        <div class="ci-name"><span class="rdot ${r}"></span>${c.name}</div>
        <div class="tb ${tbMap[c.tier]}">${c.tier}</div>
      </div>
      <div class="ci-bot">
        <div class="ci-rev">${fmt(c.total)}</div>
        <div class="ci-sub">${c.daysSince}d · ${c.invoices} inv${hasChurn(c)?' · ⚠':''}</div>
      </div>
    </div>`;
  });
  el.innerHTML=html||'<div class="empty" style="margin-top:30px">No clients found</div>';
  const tot=filtered.length,tp=Math.ceil(tot/PG);
  document.getElementById('pgInfo').textContent=`${page+1}/${Math.max(1,tp)} (${tot})`;
  document.getElementById('pgPrev').disabled=page===0;
  document.getElementById('pgNext').disabled=page>=tp-1;
}

function doFilter(){
  const q=document.getElementById('srch').value.toLowerCase();
  const tier=activeFilt;
  let base=D.clients;
  if(tier==='urgent')base=base.filter(c=>c.priority<=2);
  else if(tier==='risk')base=base.filter(c=>c.daysSince>25);
  else if(tier==='churn')base=base.filter(hasChurn);
  else if(tier==='Platinum')base=base.filter(c=>c.tier==='Platinum');
  filtered=q?base.filter(c=>c.name.toLowerCase().includes(q)):base;
  page=0;renderList();
}
function setF(f,btn){activeFilt=f;document.querySelectorAll('.sft').forEach(b=>b.classList.remove('on'));btn.classList.add('on');doFilter();}
function pgP(){if(page>0){page--;renderList();}}
function pgN(){const tp=Math.ceil(filtered.length/PG)-1;if(page<tp){page++;renderList();}}

// ── OVERVIEW ──
function renderOV(){
  const m=D.meta,mo=D.monthly;
  const urgent=D.clients.filter(c=>c.priority<=2).length;
  const noOrd=D.clients.filter(c=>c.daysSince>30).length;
  const maxRev=Math.max(...mo.map(x=>x.revenue));
  const barColors=['#b5d4f4','#378add','#1a1a2e'];
  const mb=D.topBrands[0][1];

  const priorityRows=D.clients.slice(0,8).map((c,i)=>{
    const r=risk(c);
    const dotC=r==='hot'?'#10b981':r==='warm'?'#f59e0b':'#ef4444';
    const why=c.overdue?`Order gap ${c.daysSince}d — avg ${c.avgGap}d (${c.gapRatio}x overdue)`
      :c.priority<=4?`Sales trend needs attention`
      :`Active client`;
    return`<div class="pr-row" onclick="openClient('${esc(c.name)}')">
      <div class="pr-num">${i+1}</div>
      <div class="pr-dot" style="background:${dotC}"></div>
      <div class="pr-info">
        <div class="pr-name">${c.name}</div>
        <div class="pr-why">${why} · RFM: ${c.rfm.score}</div>
      </div>
      <div class="pr-right">
        <div class="pr-val">${fmt(c.total)}</div>
        <div class="pr-days" style="color:${dotC}">${c.daysSince}d ago</div>
      </div>
    </div>`;
  }).join('');

  const tierCounts={Platinum:0,Gold:0,Silver:0,Bronze:0};
  D.clients.forEach(c=>tierCounts[c.tier]=(tierCounts[c.tier]||0)+1);

  document.getElementById('ovPanel').innerHTML=`
    <div class="ov-title">Sales Intelligence Overview</div>
    <div class="ov-sub">Jan – Mar 2026 · 3 Completed Months · April in progress (Day ${DAY} of 30) · ${D.clients.filter(c=>c.monthlyRev&&c.monthlyRev['Apr']>0).length} clients have ordered in April so far</div>

    <div class="kpis">
      <div class="kp"><div class="kp-l">Total Revenue (3mo)</div><div class="kp-v">${fmt(m.totalRevenue)}</div><div class="kp-s">${m.totalClients} active clients</div></div>
      <div class="kp"><div class="kp-l">Active Clients</div><div class="kp-v">${m.totalClients}</div><div class="kp-s">${m.totalBrands} brands · ${m.totalSKUs} SKUs</div></div>
      <div class="kp"><div class="kp-l">Urgent Calls Today</div><div class="kp-v" style="color:#ef4444">${urgent}</div><div class="kp-s">Order gap exceeded 1.5x</div></div>
      <div class="kp"><div class="kp-l">Silent 30+ Days</div><div class="kp-v" style="color:#f59e0b">${noOrd}</div><div class="kp-s">Need re-engagement</div></div>
    </div>

    <div class="g2">
      <div class="card">
        <div class="card-t">Monthly Revenue</div>
        <div class="mbars">
          ${mo.map((m2,i)=>`<div class="mbw">
            <div class="mbv">${fmt(m2.revenue)}</div>
            <div class="mbr" style="height:${Math.max(4,(m2.revenue/maxRev)*58)}px;background:${barColors[i]}"></div>
            <div class="mbl">${m2.month}</div>
          </div>`).join('')}
        </div>
      </div>
      <div class="card">
        <div class="card-t">Top Brands</div>
        ${D.topBrands.slice(0,7).map(([b,v])=>`<div class="br-row">
          <div class="br-n">${b}</div>
          <div class="br-t"><div class="br-f" style="width:${(v/mb*100).toFixed(1)}%"></div></div>
          <div class="br-v">${fmt(v)}</div>
        </div>`).join('')}
      </div>
    </div>

    <div class="g3">
      <div class="card">
        <div class="card-t">Client Tiers</div>
        ${Object.entries(tierCounts).map(([t,n])=>`<div class="ir">
          <span class="il"><span class="tb ${tbMap[t]}" style="margin-right:6px">${t}</span></span>
          <span class="iv">${n} clients</span>
        </div>`).join('')}
      </div>
      <div class="card" style="grid-column:1/-1;display:none" id="ov-pri-placeholder"></div>
    </div>

    <div class="card">
      <div class="card-t">Priority Call List <span class="pill pill-r">${urgent} urgent</span></div>
      ${priorityRows}
    </div>
  `;
}

// ── CLIENT DETAIL ──
function showOV(){
  selName=null;
  document.getElementById('ovPanel').style.display='block';
  document.getElementById('dpanel').className='dp';
  renderList();
}

function openClient(name){
  const c=D.clients.find(x=>x.name===name);
  if(!c)return;
  selName=name;
  document.getElementById('ovPanel').style.display='none';
  const dp=document.getElementById('dpanel');
  dp.className='dp on';
  buildDetail(c);
  renderList();
}

function buildDetail(c){
  const r=risk(c);
  const alertCls=r==='hot'?'a-grn':r==='warm'?'a-amb':'a-red';
  const alertMsg=r==='hot'?`Active — last purchased ${c.daysSince} day(s) ago. Good time to grow wallet share.`
    :r==='warm'?`Cooling — ${c.daysSince} days since last purchase. Follow up on recent orders.`
    :`Silent ${c.daysSince} days. Priority re-engagement — call immediately.`;
  const scColor=c.callScore>=75?'#166534':c.callScore>=55?'#854F0B':'#991b1b';
  const mVals=MONTHS.map(m=>c.monthlyRev[m]||0);
  const mOrd=MONTHS.map(m=>c.monthlyOrders[m]||0);
  const mMax=Math.max(...mVals,1);

  document.getElementById('dpanel').innerHTML=`
    <button class="back-btn" onclick="showOV()">← Overview</button>
    <div class="abn ${alertCls}">${alertMsg}</div>

    <div class="ch">
      <div class="ch-top">
        <div class="ch-av">${ini(c.name)}</div>
        <div class="ch-info">
          <div class="ch-name">${c.name}</div>
          <div class="ch-tags">
            <span class="tb ${tbMap[c.tier]}" style="font-size:9.5px;padding:3px 8px">${c.tier}</span>
            <span class="ch-tag">Since ${c.firstPurchase||'—'}</span>
            <span class="ch-tag">${c.invoices} orders</span>
            <span class="ch-tag">Avg gap: ${c.avgGap||'—'}d</span>
            ${c.overdue?'<span class="ch-tag" style="color:#991b1b;border-color:#fca5a5">⚠ Overdue '+c.gapRatio+'x</span>':''}
            ${hasChurn(c)?'<span class="ch-tag" style="color:#92400e;border-color:#fcd34d">⚠ Churn signals</span>':''}
          </div>
        </div>
        <div class="cscore">
          <div class="csn" style="color:${scColor}">${c.callScore}</div>
          <div class="csl">Call Score</div>
        </div>
      </div>

      <div class="rfm-row">
        <div class="rfm-c">
          <div class="rfm-s" style="color:${c.rfm.R>=4?'#166534':c.rfm.R>=3?'#854F0B':'#991b1b'}">${c.rfm.R}</div>
          <div class="rfm-l">Recency</div>
          <div class="rfm-sub">${c.daysSince}d ago</div>
        </div>
        <div class="rfm-c">
          <div class="rfm-s" style="color:${c.rfm.F>=4?'#166534':c.rfm.F>=3?'#854F0B':'#991b1b'}">${c.rfm.F}</div>
          <div class="rfm-l">Frequency</div>
          <div class="rfm-sub">${c.invoices} orders total</div>
        </div>
        <div class="rfm-c">
          <div class="rfm-s" style="color:${c.rfm.M>=4?'#166634':c.rfm.M>=3?'#854F0B':'#991b1b'}">${c.rfm.M}</div>
          <div class="rfm-l">Monetary</div>
          <div class="rfm-sub">${fmt(c.avgOrderVal)} avg order</div>
        </div>
        <div class="rfm-c rfm-combo">
          <div class="rfm-badge">${c.rfm.score}</div>
          <div class="rfm-sub" style="font-size:10px">${fmt(c.total)} total revenue</div>
          <div class="rfm-sub" style="font-size:10px;margin-top:2px">Avg order: ${fmt(c.avgOrderVal)}</div>
        </div>
      </div>
    </div>

    <div class="tabs" id="dtabs">
      <div class="tab on" onclick="switchTab(0)">Monthly</div>
      <div class="tab" onclick="switchTab(1)">Brands</div>
      <div class="tab" onclick="switchTab(2)">SKUs</div>
      <div class="tab" onclick="switchTab(3)">New &amp; Missing</div>
      <div class="tab" onclick="switchTab(4)">Pitch</div>
      <div class="tab" onclick="switchTab(5)">Call Log</div>
    </div>

    <div id="tc0">${buildMonthly(c,mVals,mOrd,mMax)}</div>
    <div id="tc1" style="display:none">${buildBrands(c)}</div>
    <div id="tc2" style="display:none">${buildSKUs(c)}</div>
    <div id="tc3" style="display:none">${buildNewMissing(c)}</div>
    <div id="tc4" style="display:none">${buildPitch(c)}</div>
    <div id="tc5" style="display:none">${buildCallLog(c)}</div>
  `;
}

function switchTab(i){
  document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',j===i));
  for(let j=0;j<=5;j++){const el=document.getElementById('tc'+j);if(el)el.style.display=j===i?'block':'none';}
}

// ── MONTHLY TAB ──
function buildMonthly(c,mVals,mOrd,mMax){
  const months=MONTHS;
  // Always include April as the current month column
  const aprRev=c.monthlyRev['Apr']||0;
  const aprOrd=c.monthlyOrders['Apr']||0;
  const allVals=[...mVals,aprRev];
  const allMax=Math.max(...allVals,1);

  const cells=months.map((m,i)=>{
    const v=mVals[i],o=mOrd[i];
    const prev=i>0?mVals[i-1]:null;
    let chg='',cls='mo-cell';
    if(prev!==null&&prev>0){const p=((v-prev)/prev*100).toFixed(1);chg=`<div class="mo-ch ${parseFloat(p)>=0?'up':'dn'}">${parseFloat(p)>=0?'↑':'↓'}${Math.abs(p)}%</div>`;}
    if(v>0&&v===Math.max(...mVals))cls='mo-cell best';
    else if(v>0&&v===Math.min(...mVals.filter(x=>x>0)))cls='mo-cell worst';
    else if(chg.includes('dn'))cls='mo-cell warn';
    return`<div class="${cls}">
      <div class="mo-m">${m}</div>
      <div class="mo-v">${v>0?fmt(v):'—'}</div>
      <div class="mo-o">${o>0?o+' orders':'—'}</div>
      ${chg}
    </div>`;
  }).join('');

  // April cell — always shown, marked as in-progress
  const aprChg=mVals[2]>0&&aprRev>0?`<div class="mo-ch na" style="color:#f59e0b">Day ${DAY} only</div>`:'';
  const aprCell=`<div class="mo-cell" style="border:0.5px dashed #f59e0b;background:#fffbeb">
    <div class="mo-m" style="color:#f59e0b">APR ⟳</div>
    <div class="mo-v" style="color:#92400e">${aprRev>0?fmt(aprRev):'—'}</div>
    <div class="mo-o">${aprOrd>0?aprOrd+' orders':'—'}</div>
    ${aprChg}
    <div style="font-size:9px;color:#f59e0b;margin-top:2px">In progress</div>
  </div>`;

  const barColors=['#b5d4f4','#378add','#1a1a2e','#fcd34d'];
  const bars=[...months,'Apr'].map((m,i)=>{
    const v=i<3?mVals[i]:aprRev;
    const isApr=i===3;
    return`<div class="mbw" style="height:80px">
      <div class="mbv" style="${isApr?'color:#92400e':''}">${v>0?fmt(v):'—'}</div>
      <div class="mbr" style="height:${Math.max(3,(v/allMax)*58)}px;background:${barColors[i]};${isApr?'border:1.5px dashed #f59e0b;background:#fef3c7':''}"></div>
      <div class="mbl" style="${isApr?'color:#f59e0b':''}">${m}${isApr?'~':''}</div>
    </div>`;
  }).join('');

  // MoM table including April
  const tableRows=[...months,'Apr'].map((m,i)=>{
    const v=i<3?mVals[i]:aprRev;
    const o=i<3?mOrd[i]:aprOrd;
    const prev=i>0?(i<3?mVals[i-1]:mVals[2]):null;
    let chgCell='<td class="na">—</td>';
    if(prev!==null&&prev>0){
      if(i===3){
        chgCell=`<td style="font-size:10px;color:#f59e0b">Day ${DAY} only</td>`;
      } else {
        const p=((v-prev)/prev*100).toFixed(1);
        chgCell=`<td class="${parseFloat(p)>=0?'up':'dn'}" style="font-size:10.5px;font-weight:600">${parseFloat(p)>=0?'↑':'↓'}${Math.abs(p)}%</td>`;
      }
    }
    const isApr=i===3;
    return`<tr style="${isApr?'background:#fffbeb':''}">
      <td style="${isApr?'color:#92400e;font-weight:600':''}font-family:inherit">${m}${isApr?' ⟳':''}</td>
      <td style="font-family:'JetBrains Mono',monospace">${v>0?fmt(v):'—'}</td>
      <td style="font-family:'JetBrains Mono',monospace">${o>0?o:'—'}</td>
      ${chgCell}
      <td style="font-family:'JetBrains Mono',monospace">${o>0&&v>0?fmt(v/o):'—'}</td>
    </tr>`;
  }).join('');

  const totalRev=mVals.reduce((a,b)=>a+b,0);
  const avgMonthly=totalRev/Math.max(mVals.filter(v=>v>0).length,1);

  return`
    <div class="pbn" style="margin-bottom:10px">
      <span style="width:8px;height:8px;border-radius:50%;background:#f59e0b;flex-shrink:0;display:inline-block"></span>
      April is in progress (Day ${DAY} of 30). Shown for reference only — trend analysis uses Jan–Mar completed months.
    </div>
    <div class="mo-grid" style="grid-template-columns:repeat(4,1fr)">${cells}${aprCell}</div>
    <div class="card" style="margin-top:10px">
      <div class="card-t">Month-on-Month Detail</div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:11px">
          <thead><tr style="background:var(--s2)">
            <th style="padding:6px 10px;text-align:left;font-size:9.5px;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border)">Month</th>
            <th style="padding:6px 10px;text-align:right;font-size:9.5px;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border)">Revenue</th>
            <th style="padding:6px 10px;text-align:right;font-size:9.5px;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border)">Orders</th>
            <th style="padding:6px 10px;text-align:right;font-size:9.5px;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border)">vs Prev</th>
            <th style="padding:6px 10px;text-align:right;font-size:9.5px;color:var(--hint);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--border)">Avg Order</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-t">Summary (Jan–Mar completed months)</div>
      <div class="ir"><span class="il">Total Jan–Mar Revenue</span><span class="iv">${fmt(totalRev)}</span></div>
      <div class="ir"><span class="il">Average Monthly Revenue</span><span class="iv">${fmt(avgMonthly)}</span></div>
      <div class="ir"><span class="il">April So Far (Day ${DAY})</span><span class="iv" style="color:#92400e">${fmt(aprRev)}</span></div>
      <div class="ir"><span class="il">Total Orders (Jan–Mar)</span><span class="iv">${mOrd.reduce((a,b)=>a+b,0)}</span></div>
      <div class="ir"><span class="il">Average Order Value</span><span class="iv">${fmt(c.avgOrderVal)}</span></div>
      <div class="ir"><span class="il">Personal Order Gap (avg)</span><span class="iv">${c.avgGap||'—'} days</span></div>
    </div>`;
}

// ── BRAND TAB ──
function buildBrands(c){
  const brands=c.brands||[];
  if(!brands.length)return`<div class="empty">No brand data available</div>`;

  const rows=brands.map(b=>{
    const vals=b.vals||[0,0,0];
    const cv=s=>{if(!s||s===0)return'<td class="vz">—</td>';return`<td class="val-cell">${fmt(s)}</td>`;};
    const aprtd=`<td class="vn">${b.aprVal>0?fmt(b.aprVal)+'~':'—'}</td>`;
    // Mar vs Feb change
    const feb=vals[1]||0,mar=vals[2]||0;
    let chgTd='<td class="chg na">—</td>';
    if(feb>0&&mar>0){const p=((mar-feb)/feb*100).toFixed(1);chgTd=`<td class="chg ${parseFloat(p)>=0?'up':'dn'}">${parseFloat(p)>=0?'↑':'↓'}${Math.abs(p)}%</td>`;}
    else if(feb>0&&mar===0){chgTd=`<td class="chg dn">Stopped</td>`;}
    const statusCell=`<td style="text-align:center"><span class="st ${stCls[b.status]}">${stLabel[b.status]}</span></td>`;
    const rowBg=b.status==='STOPPED'?'style="background:#fff5f5"':b.status==='DECLINING'?'style="background:#fffdf0"':'';
    return`<tr ${rowBg}><td>${b.brand}</td>${vals.map(v=>cv(v)).join('')}${aprtd}${chgTd}${statusCell}</tr>`;
  }).join('');

  const hdr=MONTHS.map(m=>`<th>${m}</th>`).join('');
  const aprHdr=`<th>Apr<br><span style="font-size:8px;color:#f59e0b">partial</span></th>`;

  return`
    <div class="pbn">
      <span style="font-size:8px;background:#f59e0b;width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block"></span>
      Day ${DAY} — Comparison shows Mar vs Feb. April shown for reference only — trend analysis uses completed months.
    </div>
    <div class="legend">
      <div class="leg"><div class="leg-d" style="background:#fef2f2;border:0.5px solid #fca5a5"></div>Stopped</div>
      <div class="leg"><div class="leg-d" style="background:#fffbeb;border:0.5px solid #fcd34d"></div>Declining</div>
      <div class="leg"><div class="leg-d" style="background:#f0fdf4;border:0.5px solid #86efac"></div>Growing</div>
      <div class="leg"><div class="leg-d" style="background:#eff6ff;border:0.5px solid #93c5fd"></div>New</div>
    </div>
    <div class="tbl-wrap">
      <table class="btbl">
        <thead><tr><th>Brand</th>${hdr}${aprHdr}<th>Mar vs Feb</th><th>Status</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── SKU TAB ──
function buildSKUs(c){
  const skus=c.skus||[];
  if(!skus.length)return`<div class="empty">No SKU data available</div>`;

  // Group by brand
  const groups={};
  skus.forEach(s=>{
    if(!groups[s.brand])groups[s.brand]={skus:[],total:0};
    groups[s.brand].skus.push(s);
    groups[s.brand].total+=s.latestVal||0;
  });

  const hdr=MONTHS.map(m=>`<th>${m}</th>`).join('');
  // Always add April header
  const aprHdr=`<th style="color:#92400e">Apr~</th>`;

  let html=`
    <div class="pbn">
      <span style="font-size:8px;background:#f59e0b;width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block"></span>
      Grouped by brand. Stopped first, then Declining, Stable, Growing, New. Apr~ = partial month (Day ${DAY} only).
    </div>
    <div class="tbl-wrap">`;

  Object.entries(groups).sort((a,b)=>{
    const aHas=a[1].skus.some(s=>s.status==='STOPPED'||s.status==='DECLINING')?0:1;
    const bHas=b[1].skus.some(s=>s.status==='STOPPED'||s.status==='DECLINING')?0:1;
    return aHas-bHas;
  }).forEach(([brand,g],gi)=>{
    const id='bg'+gi;
    const aprBrandTotal=g.skus.reduce((a,s)=>a+(s.aprVal||0),0);
    html+=`<div class="bg-head" onclick="togBG('${id}')">
      <span class="bg-arr o" id="arr-${id}">▶</span>
      <span class="bg-brand">${brand}</span>
      <span class="bg-cnt">${g.skus.length} SKU${g.skus.length>1?'s':''}</span>
      <span class="bg-tot">Mar: ${fmt(g.skus.reduce((a,s)=>a+(s.latestVal||0),0))} · Apr~: ${aprBrandTotal>0?fmt(aprBrandTotal):'—'}</span>
    </div>
    <div id="${id}">
      <table class="stbl">
        <thead><tr><th style="text-align:left">SKU Name</th>${hdr}${aprHdr}<th>Mar vs Feb</th></tr></thead>
        <tbody>
          ${g.skus.map(s=>{
            const vals=s.vals||[0,0,0];
            const aprVal=s.aprVal||0;
            const feb=vals[1]||0,mar=vals[2]||0;
            let chg='<td class="na">—</td>';
            if(feb>0&&mar>0){const p=((mar-feb)/feb*100).toFixed(1);chg=`<td class="${parseFloat(p)>=0?'up':'dn'}">${parseFloat(p)>=0?'↑':'↓'}${Math.abs(p)}%</td>`;}
            else if(feb>0&&mar===0){chg=`<td class="dn">Stopped</td>`;}
            const rowBg=s.status==='STOPPED'?'background:#fff5f5':s.status==='DECLINING'?'background:#fffdf0':s.status==='GROWING'?'background:#f0fdf4':'';
            const aprTd=`<td style="color:#92400e;font-family:'JetBrains Mono',monospace">${aprVal>0?fmt(aprVal)+'~':'<span style="color:#d1d5db">—</span>'}</td>`;
            return`<tr style="${rowBg}">
              <td title="${s.item}"><span class="sdot" style="background:${dotColor[s.status]||'#94a3b8'}"></span>${s.item}</td>
              ${vals.map(v=>`<td>${v>0?fmt(v):'<span style="color:#d1d5db">—</span>'}</td>`).join('')}
              ${aprTd}
              ${chg}
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  });

  html+='</div>';
  return html;
}

function togBG(id){
  const el=document.getElementById(id);
  const arr=document.getElementById('arr-'+id);
  const isOpen=el.style.display!=='none';
  el.style.display=isOpen?'none':'block';
  arr.classList.toggle('o',!isOpen);
}

// ── NEW & MISSING TAB ──
function buildNewMissing(c){
  const missing=c.missingSKUs||[];
  const newSkus=c.newThisMonth||[];

  // ── MISSING SECTION: only meaningful after Day 10 ──
  let missingSection='';
  if(DAY < 10){
    missingSection=`
      <div class="nm-section">
        <div class="nm-head miss">
          <span class="nm-lbl miss">Missing This Month</span>
          <span class="nm-sub" style="margin-left:8px">Available from Day 10 onwards</span>
        </div>
        <div class="section-hidden">
          Today is Day ${DAY} of the month. Missing SKU analysis starts from Day 10 to avoid false alerts in the first week.
          <br><br>
          <strong>${missing.length} SKUs</strong> are pre-computed and will appear here from Day 10.
        </div>
      </div>`;
  } else {
    const missingRows=missing.length?missing.map(s=>{
      const uc=s.urgency==='HIGH'?'urg-h':s.urgency==='MEDIUM'?'urg-m':'urg-l';
      return`<tr>
        <td title="${s.item}">${s.item}</td>
        <td style="text-align:center"><span style="font-size:9px;background:#f1f5f9;padding:1px 5px;border-radius:4px;color:#64748b">${s.brand}</span></td>
        <td style="font-family:'JetBrains Mono',monospace">${fmt(s.avgVal)}/mo avg</td>
        <td style="text-align:center"><span class="urg ${uc}">${s.urgency}</span></td>
      </tr>`;
    }).join(''):`<tr><td colspan="4"><div class="empty">No missing SKUs — all previously bought items ordered this month</div></td></tr>`;

    missingSection=`
      <div class="nm-section">
        <div class="nm-head miss">
          <span class="nm-lbl miss">Missing This Month</span>
          <span class="pill pill-r" style="margin-left:6px">${missing.length}</span>
          <span class="nm-sub">Bought in last 3 months — zero orders in ${D.meta.currentMonth} so far</span>
        </div>
        <div class="tbl-wrap">
          <table class="stbl">
            <thead><tr>
              <th style="text-align:left">SKU Name</th>
              <th style="text-align:center">Brand</th>
              <th>Avg Monthly Value</th>
              <th style="text-align:center">Urgency</th>
            </tr></thead>
            <tbody>${missingRows}</tbody>
          </table>
        </div>
      </div>`;
  }

  // ── NEW ADDITIONS SECTION: always shown ──
  const newRows=newSkus.length?newSkus.map(s=>`<tr>
    <td title="${s.item}">${s.item}</td>
    <td style="text-align:center"><span style="font-size:9px;background:#f1f5f9;padding:1px 5px;border-radius:4px;color:#64748b">${s.brand}</span></td>
    <td style="font-family:'JetBrains Mono',monospace">${fmt(s.thisMonthVal)} this month</td>
    <td style="text-align:center"><span style="font-size:8.5px;background:#dcfce7;color:#166534;padding:2px 6px;border-radius:6px;font-weight:600">✓ New</span></td>
  </tr>`).join(''):`<tr><td colspan="4"><div class="empty" style="padding:16px 0">No new SKU additions in ${D.meta.currentMonth} yet</div></td></tr>`;

  const newSection=`
    <div class="nm-section">
      <div class="nm-head new">
        <span class="nm-lbl new">New Additions This Month</span>
        <span class="pill pill-g" style="margin-left:6px">${newSkus.length}</span>
        <span class="nm-sub">Client never bought these before — started in ${D.meta.currentMonth}</span>
      </div>
      <div class="tbl-wrap">
        <table class="stbl">
          <thead><tr>
            <th style="text-align:left">SKU Name</th>
            <th style="text-align:center">Brand</th>
            <th>This Month Value</th>
            <th style="text-align:center">Status</th>
          </tr></thead>
          <tbody>${newRows}</tbody>
        </table>
      </div>
    </div>`;

  // ── TALKING POINT ──
  let talkingPoint='';
  if(newSkus.length>0){
    talkingPoint=`<div class="card" style="margin-top:10px;border-left:3px solid #10b981">
      <div class="card-t" style="color:#166534">Call Tip — New Additions</div>
      <p style="font-size:11.5px;color:var(--text);line-height:1.6">
        Client recently started buying <strong>${newSkus[0].item}</strong> (${fmt(newSkus[0].thisMonthVal)}).
        This is a warm signal — call now to offer volume pricing or introduce complementary SKUs from <strong>${newSkus[0].brand}</strong>.
      </p>
    </div>`;
  }
  if(DAY>=10 && missing.length>0){
    const topMissing=missing[0];
    talkingPoint+=`<div class="card" style="margin-top:8px;border-left:3px solid #ef4444">
      <div class="card-t" style="color:#991b1b">Call Tip — Highest Value Missing</div>
      <p style="font-size:11.5px;color:var(--text);line-height:1.6">
        <strong>${topMissing.item}</strong> (${topMissing.brand}) averages <strong>${fmt(topMissing.avgVal)}/month</strong> but has not been ordered in ${D.meta.currentMonth}.
        This is your highest-priority recovery item. Ask directly if there is a supply issue or if they are sourcing elsewhere.
      </p>
    </div>`;
  }

  return missingSection + newSection + talkingPoint;
}

// ── PITCH TAB ──
function buildPitch(c){
  const pitch=c.pitchBrands||[];
  if(!pitch.length)return`<div class="empty">Client already buys all top brands</div>`;
  return pitch.map(p=>`
    <div class="pc">
      <div class="pc-brand">+ ${p.brand}</div>
      <div class="pc-meta">Rank #${p.globalRank||'—'} overall · ${fmt(p.globalRevenue)} across all clients · Not ordered by this client</div>
      <div class="pc-items">
        ${(p.topItems||[]).map(([item,val])=>`<div class="pc-item">
          <span class="pc-iname">${item}</span>
          <span class="pc-ival">${fmt(val)}/mo avg</span>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

// ── CALL LOG TAB ──
function buildCallLog(c){
  return`
    <div class="cl-form">
      <div class="card-t" style="margin-bottom:10px">Log a call</div>
      <div class="cl-fg">
        <div>
          <div class="cl-lbl">Outcome</div>
          <select class="cl-sel" id="cl-outcome">
            <option>Positive</option>
            <option>Neutral</option>
            <option>No Answer</option>
            <option>Order Placed</option>
            <option>Not Interested</option>
            <option>Follow-up Scheduled</option>
          </select>
        </div>
        <div>
          <div class="cl-lbl">Next Call Date</div>
          <input type="date" class="cl-inp" id="cl-nextdate">
        </div>
      </div>
      <div style="margin-bottom:8px">
        <div class="cl-lbl">Notes — what was discussed</div>
        <textarea class="cl-ta" rows="2" id="cl-notes" placeholder="e.g. Client interested in Red Bull, will check budget..."></textarea>

      <button class="cl-save" onclick="saveCall('${esc(c.name)}')">Save to Sheet</button>

    <div class="card">
      <div class="card-t">Recent Call History</div>
      <div class="empty" style="min-height:50px">No calls logged yet for this client</div>
    </div>`;
}

function saveCall(name){

  // In live version this would POST to Google Apps Script
